<!-- PATTERN: chart-card -->
<!-- Universal wrapper for any chart. Use this as the outer container. -->

<!-- Basic Chart Card -->
<div class="bg-surface rounded shadow border border-line">
  <div class="px-6 py-4 border-b border-subtle flex items-center justify-between">
    <div>
      <h3 class="text-base font-semibold text-heading">{Chart Title}</h3>
      <p class="text-xs text-muted mt-0.5">{Subtitle or date range}</p>
    </div>
    <!-- Period Selector -->
    <select x-model="{periodVar}"
            class="text-xs border border-line rounded px-2 py-1 text-body bg-surface focus:outline-none focus:ring-1 focus:ring-primary">
      <option value="7d">Last 7 days</option>
      <option value="30d">Last 30 days</option>
      <option value="90d">Last 90 days</option>
    </select>
  </div>
  <div class="p-6">
    <canvas id="{chart-id}" height="260"></canvas>
  </div>
</div>

<!-- Chart Card with Footer Stats -->
<div class="bg-surface rounded shadow border border-line">
  <div class="px-6 py-4 border-b border-subtle">
    <h3 class="text-base font-semibold text-heading">{Chart Title}</h3>
  </div>
  <div class="p-6">
    <canvas id="{chart-id}" height="260"></canvas>
  </div>
  <div class="px-6 py-3 border-t border-subtle bg-inset rounded-b flex items-center justify-around">
    <div class="text-center">
      <p class="text-xs text-muted">{Metric 1 Label}</p>
      <p class="text-sm font-semibold text-heading">{value}</p>
    </div>
    <div class="text-center">
      <p class="text-xs text-muted">{Metric 2 Label}</p>
      <p class="text-sm font-semibold text-heading">{value}</p>
    </div>
    <div class="text-center">
      <p class="text-xs text-muted">{Metric 3 Label}</p>
      <p class="text-sm font-semibold text-heading">{value}</p>
    </div>
  </div>
</div>

<!-- Compact Chart Card (for grid layouts, no footer) -->
<div class="bg-surface rounded shadow border border-line p-4">
  <div class="flex items-center justify-between mb-3">
    <h3 class="text-sm font-semibold text-heading">{Chart Title}</h3>
    <span class="text-xs text-muted">{Period}</span>
  </div>
  <canvas id="{chart-id}" height="200"></canvas>
</div>
<!-- /PATTERN: chart-card -->

</div>

<!-- PATTERN: line-chart (real-time variant) -->
<!-- For live-updating dashboards (POS daily sales, active users). -->
<!-- Uses the same line-chart init but with update capability. -->

<!--
  Chart data defined in state.js:

  const realtimeData = {
    labels: [],
    datasets: [{
      label: '{Metric}',
      data: [],
      borderColor: '{colors.primary}',
      backgroundColor: '{colors.primary}15',
      fill: true,
      tension: 0.3,
      pointRadius: 0
    }]
  };

  To simulate real-time update in prototype (add to appState methods):

  simulateRealtime() {
    setInterval(() => {
      const now = new Date().toLocaleTimeString();
      const value = Math.floor(Math.random() * 100) + 50;
      const chart = chartManager.instances['{chart-id}'];
      if (chart) {
        chart.data.labels.push(now);
        chart.data.datasets[0].data.push(value);
        if (chart.data.labels.length > 20) {
          chart.data.labels.shift();
          chart.data.datasets[0].data.shift();
        }
        chart.update('none');
      }
    }, 3000);
  }
-->
<!-- /PATTERN: line-chart (real-time variant) -->
